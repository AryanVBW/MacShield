<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a1a;
      color: #fff;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .header svg { width: 20px; height: 20px; fill: #4fd1c5; }
    .header h1 { font-size: 15px; font-weight: 600; }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #333;
    }
    .toggle-label { font-size: 13px; color: #ccc; }
    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
      cursor: pointer;
    }
    .toggle input { display: none; }
    .toggle .slider {
      position: absolute;
      inset: 0;
      background: #555;
      border-radius: 11px;
      transition: background 0.2s;
    }
    .toggle input:checked + .slider { background: #4fd1c5; }
    .toggle .slider::before {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      background: #fff;
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: transform 0.2s;
    }
    .toggle input:checked + .slider::before { transform: translateX(18px); }
    .slider-row {
      padding: 12px 0 8px;
    }
    .slider-row label {
      font-size: 12px;
      color: #999;
      display: block;
      margin-bottom: 6px;
    }
    .slider-row input[type="range"] {
      width: 100%;
      accent-color: #4fd1c5;
    }
    .slider-value {
      font-size: 11px;
      color: #666;
      text-align: right;
    }
    .shortcut {
      margin-top: 12px;
      font-size: 11px;
      color: #666;
      text-align: center;
    }
    kbd {
      background: #333;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 11px;
      color: #ccc;
    }
  </style>
</head>
<body>
  <div class="header">
    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
    <h1>MacShield Web</h1>
  </div>

  <div class="toggle-row">
    <span class="toggle-label">Chat Blur</span>
    <label class="toggle">
      <input type="checkbox" id="blurToggle" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="slider-row">
    <label>Blur Intensity</label>
    <input type="range" id="blurSlider" min="2" max="20" value="8" step="1">
    <div class="slider-value" id="blurValue">8px</div>
  </div>

  <div class="shortcut">
    Toggle: <kbd>Alt</kbd> + <kbd>X</kbd>
  </div>

  <script src="popup.js"></script>
</body>
</html>
